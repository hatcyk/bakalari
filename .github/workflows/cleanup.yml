name: Cleanup Old Records

on:
  schedule:
    # Daily at 01:00 UTC (~02:00/03:00 Prague) — off-peak
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  cleanup:
    name: Cleanup Old Notification Records
    runs-on: ubuntu-latest

    steps:
      - name: Call Cleanup Endpoint
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i/$MAX_RETRIES..."
            HTTP_STATUS=$(curl -X GET "${{ secrets.VERCEL_URL }}/api/cron/cleanup" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              -w "\n%{http_code}" \
              -s -S \
              --connect-timeout 10 \
              --max-time 60)

            STATUS_CODE=$(echo "$HTTP_STATUS" | tail -1)
            BODY=$(echo "$HTTP_STATUS" | sed '$d')
            echo "Response: $BODY"
            echo "HTTP Status: $STATUS_CODE"

            if [ "$STATUS_CODE" -ge 200 ] && [ "$STATUS_CODE" -lt 300 ]; then
              echo "Success!"
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Failed (HTTP $STATUS_CODE), retrying in ${RETRY_DELAY}s..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "All $MAX_RETRIES attempts failed"
          exit 1
